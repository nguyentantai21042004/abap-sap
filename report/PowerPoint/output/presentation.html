<h2 id="b%E1%BB%91i-c%E1%BA%A3nh--v%E1%BA%A5n-%C4%91%E1%BB%81">Bối Cảnh &amp; Vấn Đề</h2>
<p>Triển khai SAP ERP song song nhiều module (MM, SD, FI, CO...) mà <strong>không có công cụ theo dõi lỗi tập trung</strong>:</p>
<div class="cols-2">
<div>
<p><strong>Hệ quả thực tế:</strong></p>
<ul>
<li>Báo cáo lỗi phân tán qua bảng tính, email, Zalo</li>
<li>Dev nhận phân công <strong>không rõ ưu tiên</strong> hay module</li>
<li>Manager <strong>không thấy</strong> phân bổ workload thời gian thực</li>
<li>Không có <strong>bằng chứng có cấu trúc</strong> về báo cáo &amp; sửa lỗi</li>
</ul>
</div>
<div>
<p><strong>Giải pháp ZBUG_WS:</strong></p>
<ul>
<li>Chạy <strong>native trên SAP</strong> — không cần license bổ sung</li>
<li>Truy cập qua <strong>1 T-code duy nhất</strong>: <code>ZBUG_WS</code></li>
<li>Dữ liệu lưu trong bảng ABAP (<code>ZBUG_TRACKER</code>, ...)</li>
<li>UI là <strong>SAP GUI thuần túy</strong> (Module Pool / Dynpro)</li>
</ul>
</div>
</div>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-theme="workshop" lang="C" data-marpit-pagination="4" style="--paginate:true;--theme:workshop;" data-marpit-pagination-total="15" data-size="16:9">

<h2 id="v%C3%B2ng-%C4%91%E1%BB%9Di-l%E1%BB%97i--10-tr%E1%BA%A1ng-th%C3%A1i">Vòng Đời Lỗi — 10 Trạng Thái</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>  [Tester/Manager tạo]
        ↓
  NEW (1) ──auto-assign──→ ASSIGNED (2) ──→ IN PROGRESS (3)
     ↓ (không có dev)              ↑                ↓
  WAITING (W) ───────────────────── ↑       SUSPENDED (4)
                                             ↓      ↓
                                         FIXED (5)  REJECTED (R)
                                             ↓
                              auto-assign──→ FINAL TESTING (6)
                                             ↓
                                        RESOLVED (V)
                                             ↓
                                         CLOSED (7) [legacy]
</code></pre>
<p><strong>Quy tắc quan trọng:</strong></p>
<ul>
<li>Trường STATUS <strong>luôn khóa</strong> trên màn hình 0300 — thay đổi chỉ qua <strong>Popup 0370</strong></li>
<li>Mọi chuyển đổi được thực thi theo <strong>ma trận vai trò</strong> (Manager / Developer / Tester)</li>
<li>Tất cả thay đổi ghi vào <code>ZBUG_HISTORY</code> (bất biến)</li>
</ul>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-theme="workshop" lang="C" data-marpit-pagination="7" style="--paginate:true;--theme:workshop;" data-marpit-pagination-total="15" data-size="16:9">
<h2 id="engine-t%E1%BB%B1-%C4%91%E1%BB%99ng-ph%C3%A2n-c%C3%B4ng">Engine Tự Động Phân Công</h2>
<p><strong>Giai đoạn A</strong> — Khi tạo lỗi (BUG_TYPE = <code>C</code>):</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Tạo lỗi → SELECT Dev từ ZBUG_USER_PROJEC (role='D', cùng project)
         → JOIN ZBUG_USERS (sap_module = bug.module, is_active='X')
         → COUNT lỗi active (status IN '2','3','4','6') cho mỗi dev
         → Chọn dev có workload THẤP NHẤT và &lt; 5
         ┌─ Tìm thấy → STATUS='2' (Assigned), gửi email
         └─ Không có → STATUS='W' (Waiting), báo Manager
</code></pre>
<p><strong>Giai đoạn B</strong> — Khi chuyển sang Fixed (5):</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Fixed → SELECT Tester từ project (role='T', cùng module)
      → COUNT lỗi Final Testing đang hoạt động
      → Chọn tester workload thấp nhất và &lt; 5
      ┌─ Tìm thấy → VERIFY_TESTER_ID, STATUS='6' (Final Testing)
      └─ Không có → STATUS='W' (Waiting)
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-theme="workshop" lang="C" data-marpit-pagination="8" style="--paginate:true;--theme:workshop;" data-marpit-pagination-total="15" data-size="16:9">
<h2 id="ki%E1%BB%83m-so%C3%A1t-ph%C3%A2n-quy%E1%BB%81n-theo-vai-tr%C3%B2">Kiểm Soát Phân Quyền Theo Vai Trò</h2>
<p><strong>Nhóm màn hình (Screen Groups) — khóa trường động:</strong></p>
<table>
<thead>
<tr>
<th style="text-align:left">Nhóm</th>
<th style="text-align:left">Trường</th>
<th style="text-align:left">Điều kiện khóa</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left"><code>STS</code></td>
<td style="text-align:left">STATUS</td>
<td style="text-align:left"><strong>Luôn khóa</strong> — chỉ đổi qua popup 0370</td>
</tr>
<tr>
<td style="text-align:left"><code>BID</code></td>
<td style="text-align:left">BUG_ID</td>
<td style="text-align:left">Luôn khóa — tự tạo (BUG0000001)</td>
</tr>
<tr>
<td style="text-align:left"><code>PRJ</code></td>
<td style="text-align:left">PROJECT_ID</td>
<td style="text-align:left">Khóa sau khi đặt từ context dự án</td>
</tr>
<tr>
<td style="text-align:left"><code>FNC</code></td>
<td style="text-align:left">BUG_TYPE, PRIORITY, SEVERITY</td>
<td style="text-align:left">Khóa với Developer</td>
</tr>
<tr>
<td style="text-align:left"><code>DEV</code></td>
<td style="text-align:left">DEV_ID, VERIFY_TESTER_ID</td>
<td style="text-align:left">Khóa với Tester</td>
</tr>
<tr>
<td style="text-align:left"><code>EDT</code></td>
<td style="text-align:left">Tất cả trường editable</td>
<td style="text-align:left">Khóa ở chế độ Display</td>
</tr>
</tbody>
</table>
<p><strong>Thực thi:</strong> <code>LOOP AT SCREEN ... MODIFY SCREEN</code> trong module PBO — không vai trò nào bypass được</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-theme="workshop" lang="C" data-marpit-pagination="9" style="--paginate:true;--theme:workshop;" data-marpit-pagination-total="15" data-size="16:9">
<h2 id="qu%E1%BA%A3n-l%C3%BD-b%E1%BA%B1ng-ch%E1%BB%A9ng--email">Quản Lý Bằng Chứng &amp; Email</h2>
<div class="cols-2">
<div>
<p><strong>3 loại bằng chứng (SMW0 Templates):</strong></p>
<ul>
<li><code>ZBT_TMPL_01</code> → <code>Bug_report.xlsx</code> (Tester báo cáo)</li>
<li><code>ZBT_TMPL_02</code> → <code>fix_report.xlsx</code> (Dev sửa lỗi)</li>
<li><code>ZBT_TMPL_03</code> → <code>confirm_report.xlsx</code> (Tester xác nhận)</li>
</ul>
<p><strong>Lưu trữ:</strong> Bảng <code>ZBUG_EVIDENCE</code> — trường <code>CONTENT</code> kiểu <code>RAWSTRING</code></p>
<p><strong>Quy tắc:</strong> Bắt buộc có bằng chứng trước khi chuyển → Fixed (5)</p>
</div>
<div>
<p><strong>Thông báo Email (CL_BCS API):</strong></p>
<table>
<thead>
<tr>
<th style="text-align:left">Sự kiện</th>
<th style="text-align:left">Người nhận</th>
</tr>
</thead>
<tbody>
<tr>
<td style="text-align:left">CREATE</td>
<td style="text-align:left">Dev được phân công + Manager</td>
</tr>
<tr>
<td style="text-align:left">ASSIGN</td>
<td style="text-align:left">Dev được phân công</td>
